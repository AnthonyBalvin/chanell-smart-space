  <body>
    <!-- Fallback if the projector SVG isn't parsed perfectly as ICO by all browsers, we map it directly as SVG -->
    <script>
      const link = document.querySelector("link[rel~='icon']");
      if (!link) {
          const newLink = document.createElement('link');
          newLink.rel = 'icon';
          newLink.type = 'image/svg+xml';
          newLink.href = '/favicon.ico'; // we downloaded a svg and named it .ico
          document.head.appendChild(newLink);
      }
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
